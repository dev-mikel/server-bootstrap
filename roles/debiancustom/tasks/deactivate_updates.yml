---
- name: Remove unattended-upgrades package
  apt:
    name: unattended-upgrades
    state: absent
    purge: yes
  register: remove_unattended

- name: Disable and stop apt-daily.service
  systemd:
    name: apt-daily.service
    state: stopped
    enabled: no
    masked: yes

- name: Disable and stop apt-daily.timer
  systemd:
    name: apt-daily.timer
    state: stopped
    enabled: no
    masked: yes

- name: Disable and stop apt-daily-upgrade.service
  systemd:
    name: apt-daily-upgrade.service
    state: stopped
    enabled: no
    masked: yes

- name: Disable and stop apt-daily-upgrade.timer
  systemd:
    name: apt-daily-upgrade.timer
    state: stopped
    enabled: no
    masked: yes

- name: Disable APT periodic configuration
  copy:
    dest: /etc/apt/apt.conf.d/10disable-periodic
    content: |
      APT::Periodic::Enable "0";
      APT::Periodic::Update-Package-Lists "0";
      APT::Periodic::Download-Upgradeable-Packages "0";
      APT::Periodic::AutocleanInterval "0";
      APT::Periodic::Unattended-Upgrade "0";
    owner: root
    group: root
    mode: '0644'

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes