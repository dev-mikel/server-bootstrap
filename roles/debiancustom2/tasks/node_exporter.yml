# roles/infra_base/tasks/node_exporter.yml

- name: Validate node exporter service user exists
  command: "getent passwd {{ node_exporter_user }}"
  register: node_exporter_user_check
  changed_when: false
  failed_when: false
  when: node_exporter_enabled | bool

- name: Fail if service user does not exist
  assert:
    that:
      - node_exporter_user_check.rc == 0
    fail_msg: "Configured node_exporter_user does not exist"
  when: node_exporter_enabled | bool

- name: Ensure installation directory exists
  file:
    path: "{{ node_exporter_install_path }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: node_exporter_enabled | bool

- name: Determine architecture mapping
  set_fact:
    node_exporter_arch: >-
      {{
        'amd64' if ansible_architecture in ['x86_64', 'amd64']
        else 'arm64' if ansible_architecture in ['aarch64', 'arm64']
        else ansible_architecture
      }}
  when: node_exporter_enabled | bool

- name: Build node exporter download URL dynamically
  set_fact:
    node_exporter_effective_download_url: >-
      {{
        node_exporter_base_url
        ~ '/v' ~ node_exporter_version
        ~ '/node_exporter-' ~ node_exporter_version
        ~ '.linux-' ~ node_exporter_arch
        ~ '.tar.gz'
      }}
  when: node_exporter_enabled | bool

- name: Check installed node exporter version
  command: "{{ node_exporter_install_path }}/node_exporter --version"
  register: node_exporter_version_check
  failed_when: false
  changed_when: false
  when: node_exporter_enabled | bool

- name: Set installed version fact safely
  set_fact:
    node_exporter_installed_version: >-
      {{
        (
          node_exporter_version_check.stdout
          | default('')
          | regex_findall('version[= ]+([0-9.]+)')
          | first
        )
        if (
          node_exporter_version_check.rc == 0 and
          (node_exporter_version_check.stdout | default('')) | length > 0 and
          (
            node_exporter_version_check.stdout
            | regex_findall('version[= ]+([0-9.]+)')
          ) | length > 0
        )
        else ''
      }}
  when: node_exporter_enabled | bool

- name: Download node exporter archive if version mismatch
  get_url:
    url: "{{ node_exporter_effective_download_url }}"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}-{{ node_exporter_arch }}.tar.gz"
    mode: '0644'
  when:
    - node_exporter_enabled | bool
    - node_exporter_installed_version != node_exporter_version

- name: Extract node exporter archive
  unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}-{{ node_exporter_arch }}.tar.gz"
    dest: "/tmp"
    remote_src: true
    creates: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}"
  when:
    - node_exporter_enabled | bool
    - node_exporter_installed_version != node_exporter_version

- name: Install node exporter binary
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}/node_exporter"
    dest: "{{ node_exporter_install_path }}/node_exporter"
    owner: root
    group: root
    mode: '0755'
    remote_src: true
  notify: Restart node exporter
  when:
    - node_exporter_enabled | bool
    - node_exporter_installed_version != node_exporter_version

- name: Create systemd service unit
  copy:
    dest: "/etc/systemd/system/{{ node_exporter_service_name }}.service"
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=Node Exporter
      After=network.target

      [Service]
      User={{ node_exporter_user }}
      Group={{ node_exporter_user }}
      Type=simple
      ExecStart={{ node_exporter_install_path }}/node_exporter \
        --web.listen-address={{ node_exporter_bind_address }}:{{ node_exporter_port }}
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  notify:
    - Reload systemd
    - Restart node exporter
  when: node_exporter_enabled | bool

- name: Ensure node exporter service is enabled and running
  systemd:
    name: "{{ node_exporter_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
  when: node_exporter_enabled | bool

- name: Ensure firewall allows node exporter port from authorized sources
  community.general.ufw:
    rule: allow
    port: "{{ node_exporter_port }}"
    proto: tcp
    src: "{{ item }}"
  loop: "{{ node_exporter_allowed_sources }}"
  when:
    - node_exporter_enabled | bool
    - node_exporter_manage_firewall | bool